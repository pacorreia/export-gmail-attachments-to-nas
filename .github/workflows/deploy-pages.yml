name: Deploy GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - '.github/pages/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Copy pages to build directory
        run: |
          mkdir -p build
          cp .github/pages/index.html build/index.html
          cp .github/pages/style.css  build/style.css

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages 2>/dev/null || true

          if git rev-parse --verify origin/gh-pages > /dev/null 2>&1; then
            git checkout gh-pages
            git reset --hard origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi

          cp -r build/* .
          rm -rf build

          git add index.html style.css
          git diff --cached --quiet && echo "No changes to deploy." && exit 0
          git commit -m "chore: update GitHub Pages [skip ci]"
          git push origin gh-pages
          rm -rf build
          
          # Stage and commit changes
          git add index.html style.css
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy: Update GitHub Pages"
            git push origin gh-pages
          fi