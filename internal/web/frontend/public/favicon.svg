<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Blue rounded square background -->
  <rect width="32" height="32" rx="6" fill="#1565C0"/>

  <!-- Envelope body -->
  <rect x="4" y="5" width="20" height="14" rx="1.5"
        fill="white" fill-opacity="0.12" stroke="white" stroke-width="1.5"/>
  <!-- Envelope flap (V fold) -->
  <path d="M4 5 L14 13 L24 5" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Down arrow badge — overlapping bottom-left corner -->
  <circle cx="8" cy="22" r="7" fill="#2E7D32"/>
  <!-- Arrow shaft -->
  <path d="M8 18 L8 23.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrow head -->
  <path d="M5.5 21.5 L8 25 L10.5 21.5"
        stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Paperclip badge — overlapping bottom-right corner -->
  <circle cx="24" cy="22" r="7" fill="#F57C00"/>
  <!-- Paperclip shape (white): outer loop arch → left side → bottom curve → right side + inner loop -->
  <path d="M25 17 C25 15.5 22.5 15.5 22.5 17 L22.5 24.5 C22.5 27 27 27 27 24.5 L27 18.5 C27 17 24.5 17 24.5 18.5 L24.5 24.5"
        stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
